<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Редактор — rus_test1.m3u</title>
    <style>
        :root {
            --primary: #0066ff;
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(90deg, #0066ff, #3388ff);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 { font-size: 24px; font-weight: 600; }
        
        .main {
            padding: 30px;
        }
        
        .login-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: #0052cc; transform: translateY(-2px); }
        
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        th {
            background: #f1f5f9;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        td input {
            margin: 0;
            border: 1px solid #ddd;
            padding: 8px 10px;
            font-size: 15px;
        }
        
        tr:hover {
            background: #f8fafc;
        }
        
        .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .actions button {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 M3U Редактор</h1>
            <div>rus_test1.m3u</div>
        </header>

        <div class="main">
            <!-- Login -->
            <div id="login-box" class="login-box">
                <h2>Вход в редактор</h2>
                <input type="text" id="username" placeholder="Логин" value="nzavedeev">
                <input type="password" id="password" placeholder="Пароль">
                <button class="btn-primary" onclick="checkLogin()" style="width:100%; padding:14px;">Войти</button>
            </div>

            <!-- Editor -->
            <div id="editor" style="display:none">
                <div class="toolbar">
                    <button onclick="addChannel()" class="btn-primary">+ Добавить канал</button>
                    <button onclick="saveToGitHub()" class="btn-success">💾 Сохранить в GitHub</button>
                    <button onclick="loadChannels()">🔄 Обновить список</button>
                    <button onclick="logout()" style="background:#6b7280; color:white;">Выйти</button>
                </div>

                <p style="margin-bottom:10px;">
                    👤 Пользователь: <strong id="current-user"></strong>
                </p>

                <table id="table">
                    <thead>
                        <tr>
                            <th width="35%">Название канала</th>
                            <th width="55%">Ссылка на поток (m3u8)</th>
                            <th width="10%">Действия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === ВСЯ ТВОЯ ПРЕЖНЯЯ ЛОГИКА (без изменений) ===
        const OWNER = "nzavedeev";
        const REPO = "mytvlist";
        const FILE = "rus_test1.m3u";
        const BRANCH = "main";

        let channels = [];
        let token = localStorage.getItem("github_token") || "";

        const USERS = {
            "nzavedeev": "твой_пароль_здесь",   // ← замени на свой
            "gost": "12345"
        };

        function saveToken() {
            token = prompt("Вставь GitHub Personal Access Token:", token);
            if (token) {
                localStorage.setItem("github_token", token);
                alert("✅ Токен сохранён");
            }
        }

        function checkLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;

            if (USERS[user] && USERS[user] === pass) {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("editor").style.display = "block";
                document.getElementById("current-user").textContent = user;
                if (!token) saveToken();
                loadChannels();
            } else {
                alert("❌ Неверный логин или пароль");
            }
        }

        function logout() {
            document.getElementById("login-box").style.display = "block";
            document.getElementById("editor").style.display = "none";
        }

        async function loadChannels() {
            if (!token) {
                if (!confirm("Токен не найден. Ввести сейчас?")) return;
                saveToken();
            }
            try {
                const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FILE}`;
                const resp = await fetch(url);
                const text = await resp.text();
                channels = parseM3U(text);
                renderTable();
            } catch (e) {
                alert("Ошибка загрузки списка");
            }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const ch = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',').pop().trim();
                    const url = lines[++i] ? lines[i].trim() : '';
                    ch.push({name, url});
                }
            }
            return ch;
        }

        function buildM3U(channels) {
            let out = "#EXTM3U\n";
            for (let ch of channels) {
                out += `#EXTINF:-1,${ch.name}\n${ch.url}\n`;
            }
            return out;
        }

        function renderTable() {
            const tbody = document.querySelector("#table tbody");
            tbody.innerHTML = "";
            channels.forEach((ch, i) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><input value="${ch.name.replace(/"/g, '&quot;')}" onchange="channels[${i}].name=this.value"></td>
                    <td><input value="${ch.url}" onchange="channels[${i}].url=this.value"></td>
                    <td class="actions">
                        <button onclick="moveUp(${i})">↑</button>
                        <button onclick="moveDown(${i})">↓</button>
                        <button onclick="deleteCh(${i})" class="btn-danger">🗑</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addChannel() {
            channels.push({name: "Новый канал", url: "https://"});
            renderTable();
        }

        function deleteCh(i) {
            if (confirm("Удалить этот канал?")) {
                channels.splice(i, 1);
                renderTable();
            }
        }

        function moveUp(i) {
            if (i > 0) {
                [channels[i], channels[i-1]] = [channels[i-1], channels[i]];
                renderTable();
            }
        }

        function moveDown(i) {
            if (i < channels.length - 1) {
                [channels[i], channels[i+1]] = [channels[i+1], channels[i]];
                renderTable();
            }
        }

        async function saveToGitHub() {
            if (!token) return alert("Нет GitHub токена");
            
            const content = buildM3U(channels);
            const encoded = btoa(unescape(encodeURIComponent(content)));

            const shaUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
            let sha = "";
            try {
                const r = await fetch(shaUrl, { headers: { Authorization: `token ${token}` } });
                sha = (await r.json()).sha;
            } catch (e) { return alert("Не удалось получить SHA"); }

            const body = {
                message: "Обновление плейлиста через веб-редактор",
                content: encoded,
                sha: sha,
                branch: BRANCH
            };

            const resp = await fetch(shaUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                alert("✅ Успешно сохранено в GitHub!");
            } else {
                alert("Ошибка сохранения: " + resp.status);
            }
        }

        // Автозаполнение токена
        if (token) console.log("Токен загружен из localStorage");
    </script>
</body>
</html>
